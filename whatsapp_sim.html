<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp — AnchorFlow Alerts (Upgraded)</title>

<style>
body {
  background: #111b21;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Phone */
.phone {
  width: 375px;
  height: 780px;
  background: #111b21;
  border-radius: 44px;
  border: 8px solid #2a3942;
  box-shadow: 0 40px 80px rgba(0,0,0,.6);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.phone.critical-state {
  border-color: #dc2626;
  box-shadow: 0 0 30px rgba(220, 38, 38, 0.4);
  transition: all 0.6s ease;
}

/* Header */
.status-bar {
  background: #1f2c34;
  padding: 10px 20px;
  color: #e9edef;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.chat-header {
  background: #1f2c34;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #2a3942;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #00a884;
  display: flex;
  align-items: center;
  justify-content: center;
}

.name { color: #e9edef; font-weight: 600; }
.sub { color: #8696a0; font-size: 12px; }

.chat-body {
  flex: 1;
  overflow-y: auto;
  background: #0b141a;
  padding: 14px;
}

/* Messages */
.bubble {
  max-width: 85%;
  background: #1f2c34;
  color: #e9edef;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  animation: slideIn 0.25s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.badge {
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}

.badge.critical { background: #dc2626; }
.badge.healthy { background: #16a34a; }

/* Button */
.action-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #00a884;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.action-btn.loading {
  background: #2a3942;
  color: #8696a0;
  cursor: wait;
}

.chat-input {
  background: #1f2c34;
  padding: 10px;
  display: flex;
}

.chat-input input {
  flex: 1;
  background: #2a3942;
  border: none;
  border-radius: 20px;
  padding: 10px;
  color: white;
}
</style>
</head>

<body>

<div class="phone" id="phone">
  <div class="status-bar">
    <span id="clock">--:--</span>
    <span>WiFi</span>
  </div>

  <div class="chat-header">
    <div class="avatar">⚡</div>
    <div>
      <div class="name">AnchorFlow Alerts</div>
      <div class="sub" id="statusText">Monitoring active</div>
    </div>
  </div>

  <div class="chat-body" id="chat">
    <div class="bubble">
      System online. Waiting for signals.
    </div>
  </div>

  <div class="chat-input">
    <input type="text" placeholder="Message (disabled)" readonly>
  </div>
</div>

<script>
const HEALTH_URL = "/health/alerts";
const RECOVER_URL = "/demo/recover";

/* ---------------- STATE MACHINE ---------------- */
const state = {
  lastStatus: null,
  alertActive: false,
  recovering: false,
  incidentId: null,
  polling: false
};

/* ---------------- SAFE CLOCK ---------------- */
setInterval(() => {
  const d = new Date();
  document.getElementById("clock").textContent =
    d.getHours().toString().padStart(2,"0") + ":" +
    d.getMinutes().toString().padStart(2,"0");
}, 1000);

/* ---------------- HELPERS ---------------- */
function addBubble(html) {
  const div = document.createElement("div");
  div.className = "bubble";
  div.innerHTML = html;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}

function setStatus(text) {
  document.getElementById("statusText").textContent = text;
}

/* ---------------- POLLING LOOP (SAFE) ---------------- */
async function poll() {
  if (state.polling) return;
  state.polling = true;

  try {
    const res = await fetch(HEALTH_URL);
    const data = await res.json();

    const hs = data?.health_score || {};
    const metrics = data?.metrics || {};

    const status = hs?.status || "unknown";
    const score = hs?.score ?? 100;

    const phone = document.getElementById("phone");

    /* UI critical state */
    if (status === "critical") {
      phone.classList.add("critical-state");
    } else {
      phone.classList.remove("critical-state");
    }

    /* ---------------- CRITICAL ---------------- */
    if (status === "critical" && !state.alertActive) {
      state.alertActive = true;
      state.recovering = false;
      state.incidentId = crypto.randomUUID();

      addBubble(`
        <strong>🚨 CRITICAL ALERT</strong><br>
        Incident: ${state.incidentId}<br>
        Score: ${Math.round(score)}/100<br>
        P95: ${Math.round(metrics.overall_p95_ms || 0)}ms<br>

        <button class="action-btn" onclick="recover(this)">
          Confirm Recovery
        </button>
      `);

      setStatus("Critical incident active");
    }

    /* ---------------- RECOVERY COMPLETE ---------------- */
    if (
      status === "healthy" &&
      state.recovering === true
    ) {
      state.alertActive = false;
      state.recovering = false;

      addBubble(`
        <strong>✅ RECOVERY COMPLETE</strong><br>
        Incident resolved: ${state.incidentId}<br>
        Score restored to ${Math.round(score)}/100
      `);

      setStatus("Monitoring active");
      state.incidentId = null;
    }

    state.lastStatus = status;

  } catch (e) {
    console.error("Polling error:", e);
  } finally {
    state.polling = false;
  }
}

/* ---------------- ACTION HANDLER ---------------- */
async function recover(btn) {
  if (state.recovering) return;

  state.recovering = true;
  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "Processing...";

  try {
    await fetch(RECOVER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        incidentId: state.incidentId
      })
    });

    setStatus("Recovering system...");

    addBubble(`
      <strong>🛠 Recovery Initiated</strong><br>
      Restarting services for incident ${state.incidentId}
    `);

  } catch (e) {
    console.error(e);
  }
}

/* ---------------- START LOOP ---------------- */
setInterval(poll, 3000);
poll();
</script>

</body>
</html>
